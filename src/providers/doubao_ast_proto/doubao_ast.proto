syntax = "proto3";

package data.speech.ast;

// Consolidated from the official protos.tar.gz attachment in the supplied
// Doubao Speech API PDF, section 5.1. Field numbers are kept unchanged.

enum EventType {
  EVENT_NONE = 0;
  START_SESSION = 100;
  FINISH_SESSION = 102;
  SESSION_STARTED = 150;
  SESSION_FINISHED = 152;
  SESSION_FAILED = 153;
  USAGE_RESPONSE = 154;
  TASK_REQUEST = 200;
  UPDATE_CONFIG = 201;
  AUDIO_MUTED = 250;
  TTS_SENTENCE_START = 350;
  TTS_SENTENCE_END = 351;
  TTS_RESPONSE = 352;
  SOURCE_SUBTITLE_START = 650;
  SOURCE_SUBTITLE_RESPONSE = 651;
  SOURCE_SUBTITLE_END = 652;
  TRANSLATION_SUBTITLE_START = 653;
  TRANSLATION_SUBTITLE_RESPONSE = 654;
  TRANSLATION_SUBTITLE_END = 655;
}

message RequestMeta {
  string endpoint = 1;
  string app_key = 2;
  string app_id = 3;
  string resource_id = 4;
  string connection_id = 5;
  string session_id = 6;
  int32 sequence = 7;
}

message BillingItem {
  string unit = 1;
  float quantity = 2;
}

message Billing {
  repeated BillingItem items = 1;
  int64 duration_msec = 2;
  int64 word_count = 3;
}

message ResponseMeta {
  string session_id = 1;
  int32 sequence = 2;
  int32 status_code = 3;
  string message = 4;
  optional Billing billing = 5;
}

message User {
  string uid = 1;
  string did = 2;
  string platform = 3;
  string sdk_version = 4;
  string app_version = 5;
}

message Corpus {
  string context = 1;
  string boosting_table_id = 2;
  string boosting_table_name = 3;
  string boosting_id = 4;
  string nnlm_id = 5;
  string correct_table_id = 6;
  string correct_table_name = 7;
  string punc_hot_words = 8;
  repeated string hot_words_list = 9;
  map<string, string> glossary_list = 10;
  optional bool show_match_hot_words = 61;
  optional bool show_all_match_hot_words = 62;
  optional bool show_effective_hot_words = 63;
}

message Audio {
  string data = 1;
  string url = 2;
  string url_type = 3;
  string format = 4;
  string codec = 5;
  string language = 6;
  int32 rate = 7;
  int32 bits = 8;
  int32 channel = 9;
  string tos_bucket = 10;
  string tos_access_key = 11;
  string audio_tos_object = 12;
  string role_trn = 13;
  bytes binary_data = 14;
}

message TranslateParams {
  string mode = 1;
  string source_language = 2;
  string target_language = 3;
  string speaker_id = 4;
  Corpus corpus = 100;
}

message TranslateRequest {
  optional RequestMeta request_meta = 1;
  EventType event = 2;
  User user = 3;
  Audio source_audio = 4;
  Audio target_audio = 5;
  TranslateParams request = 6;
  optional bool denoise = 7;
  optional bool enable_speaker_info = 9;
}

message TranslateResponse {
  optional ResponseMeta response_meta = 1;
  EventType event = 2;
  bytes data = 3;
  string text = 4;
  int32 start_time = 5;
  int32 end_time = 6;
  bool spk_chg = 7;
  int32 muted_duration_ms = 8;
  string speaker_id = 9;
}
